# Project information
site_name: dstack
site_url: https://dstack.ai
site_author: dstack GmbH
site_description: >-
  dstack is a unified control plane for GPU provisioning and orchestration that works with any GPU cloud, Kubernetes, or on-prem clusters.

# Repository
repo_url: https://github.com/dstackai/dstack
repo_name: dstackai/dstack
edit_uri: edit/master/mkdocs/

#Copyright
copyright: © 2026, dstack Inc. All rights reserved.

# Source directory for site content
docs_dir: mkdocs

hooks:
  - scripts/docs/hooks.py

# Configuration
theme:
  name: material
  custom_dir: mkdocs/overrides
  logo: assets/images/dstack-logo-notext.svg
  favicon: assets/images/dstack-fav-32.ico
  icon:
    repo: custom/github
    edit: material/pencil
    annotation: material/arrow-right-circle
  font:
    text: Source Sans Pro
    code: IBM Plex Mono
  # Light (default) + dark (slate) schemes WITH toggles — Material needs the toggle radios so its
  # palette JS honors the stored __palette and applies it during parse (flash-free). We HIDE the
  # toggle buttons via CSS (cloudscape-docs.css) and drive the choice from the shared `dstack-theme`
  # localStorage key (website/src/theme.ts), translated into __palette in main.html's extrahead.
  palette:
    - scheme: default
      primary: white
      accent: lilac
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: white
      accent: lilac
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.tooltips
    - navigation.path
    - content.code.copy
    - content.action.edit
    #    - navigation.indexes
    - navigation.tabs
    #    - navigation.instant
    #    - toc.integrate
    # Comment to switch to sections in sidebar
    - navigation.sections
    #    - navigation.expand
    - navigation.top
    # announce.dismiss removed — /old's banner has no dismiss (×) button
    - navigation.tracking
    - navigation.footer

