<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <!--
      The landing page ("/") is served by the React app in website/. This MkDocs page only
      renders when the docs are served on their own (e.g. `mkdocs serve` locally); in that
      case send visitors to the docs. In the integrated build the React index.html overlays
      this file, so this redirect never ships to production.
    -->
    <meta http-equiv="refresh" content="0; url=docs/">
    <link rel="canonical" href="docs/">
  </head>
  <body>
    <p>Redirecting to <a href="docs/">the documentation</a>…</p>
  </body>
</html>
